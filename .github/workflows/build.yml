name: Build

# Trigger: push a version tag (e.g. git tag v1.0.0 && git push --tags)
# or run manually from the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ── macOS — produces Groupthink-mac.dmg ────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: groupthink   # repo checked out as ./groupthink so imports resolve

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pyinstaller \
            anthropic openai google-genai tavily-python \
            python-dotenv aiofiles qasync \
            PyQt6 PyQt6-WebEngine

      - name: Build .app
        run: pyinstaller groupthink/groupthink.spec

      - name: Package as DMG
        run: |
          hdiutil create \
            -volname "Groupthink" \
            -srcfolder dist/Groupthink.app \
            -ov -format UDZO \
            dist/Groupthink-mac.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: Groupthink-mac
          path: dist/Groupthink-mac.dmg

  # ── Windows — produces Groupthink.exe ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: groupthink

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install `
            pyinstaller `
            anthropic openai google-genai tavily-python `
            python-dotenv aiofiles qasync `
            PyQt6 PyQt6-WebEngine

      - name: Build .exe
        run: pyinstaller groupthink/groupthink.spec

      - uses: actions/upload-artifact@v4
        with:
          name: Groupthink-windows
          path: dist/Groupthink.exe

  # ── GitHub Release — attaches both files to the tagged release ─────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/Groupthink-mac/Groupthink-mac.dmg
            artifacts/Groupthink-windows/Groupthink.exe
